services:
  fakevine-dev:
    image: ghcr.io/comictools/fakevine:latest-dev@sha256:933772ba1437bc7eff2e78226a2331b2bec7790dbd0baa9c57ef7ebe21e4e4a2
    ports:
      - "8463:8463"
      - "5678:5678"
    volumes:
      - fakevine-dev-data:/data
    environment:
      - FAKEVINE_LOG_FILE_ENABLE=true
      - FAKEVINE_LOG_FILE_NAME=/data/fakevine.log
      - FAKEVINE_CACHE_DB_PATH=/data/cache-trunk.sqlite
      - FAKEVINE_CACHE_CV_API_KEY=replaceme
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8463/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  fakevine-dev-data:
