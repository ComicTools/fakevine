name: Delete Docker Images for Deleted Branch

on:
  delete

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event.ref_type == 'branch' && github.event.ref != 'master' && !startsWith(github.event.ref, 'renovate/') && !startsWith(github.event.ref, 'release-please/')
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Docker images for branch
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          
          # Function to delete package versions matching a pattern
          delete_images_by_tag() {
            TAG_PATTERN=$1
            
            # Get all package versions and filter by tag pattern
            VERSIONS=$(gh api repos/${{ github.repository }}/packages/container/${{ env.IMAGE_NAME }}/versions \
              --paginate \
              --jq ".[] | select(.metadata.container.tags[] | test(\"^${TAG_PATTERN}\")) | .id" || true)
            
            if [ -z "$VERSIONS" ]; then
              echo "No images found matching pattern: ${TAG_PATTERN}"
              return 0
            fi
            
            for VERSION_ID in $VERSIONS; do
              echo "Deleting image version: $VERSION_ID"
              gh api -X DELETE repos/${{ github.repository }}/packages/container/${{ env.IMAGE_NAME }}/versions/$VERSION_ID \
                || echo "Failed to delete version $VERSION_ID"
            done
          }
          
          # Delete images tagged with branch name (both prod and dev)
          delete_images_by_tag "${BRANCH_NAME}$"
          delete_images_by_tag "${BRANCH_NAME}-"
          delete_images_by_tag "${BRANCH_NAME}-dev$"
          delete_images_by_tag "${BRANCH_NAME}-dev-"
          
          echo "Cleanup completed for branch: ${BRANCH_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
