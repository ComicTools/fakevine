services:
  fakevine:
    image: ghcr.io/comictools/fakevine:latest@sha256:ca8753ab6034e5527dd4685b6b49419655401d7b19e696c73dcf24d552fb424c
    ports:
      - "8463:8463"
    volumes:
      - fakevine-data:/data
    environment:
      - FAKEVINE_LOG_FILE_ENABLE=true
      - FAKEVINE_LOG_FILE_NAME=/data/fakevine.log
      - FAKEVINE_CACHE_DB_PATH=/data/cache-trunk.sqlite
      - FAKEVINE_CACHE_CV_API_KEY=replaceme
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8463/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  fakevine-data:
